<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyProject</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #f4f7ff, #e8fff5);
        color: #1f2937;
        display: grid;
        place-items: center;
      }

      main {
        width: min(90vw, 720px);
        padding: 2rem;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
        text-align: center;
      }

      h1 {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Welcome to MyProject</h1>
      <p>Your website is live. Start customizing this page to build your site.</p>
    </main>
  </body>
</html>
